<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continue to Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f5f0eb;
      font-family: 'Nunito', sans-serif;
      margin: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; user-select: none;
    }
    .msg { text-align: center; animation: pulse 2s infinite ease-in-out; }
    .text { font-size: 24px; font-weight: 700; color: #e85d26; text-transform: uppercase; }
    .sub { font-size: 14px; color: #9a8a7a; margin-top: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
  </style>
</head>
<body onclick="launch()">
  <div class="msg">
    <div class="text">Click anywhere to Continue</div>
    <div class="sub">(Opens Support Page)</div>
  </div>
  <script>
    function launch() {
      // Navigate to the main query page
      window.location.href = 'query-page.html';
    }
  </script>
</body>
</html>
